services:
  agent:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: hinglish-collection-agent:latest
    container_name: hinglish-agent
    env_file: ../.env
    # Pass the host's audio devices through. Linux: /dev/snd works directly.
    # macOS: Docker Desktop does NOT pass mic; use `make run` on the host
    # instead. README documents this.
    devices:
      - "/dev/snd:/dev/snd"
    group_add:
      - audio
    # PulseAudio passthrough for Linux desktops
    environment:
      - PULSE_SERVER=unix:/run/user/1000/pulse/native
      - WHISPER_MODEL=${WHISPER_MODEL:-large-v3}
      - WHISPER_COMPUTE_TYPE=${WHISPER_COMPUTE_TYPE:-int8}
      - VAD_SILENCE_MS=${VAD_SILENCE_MS:-300}
      - PIPELINE=${PIPELINE:-ours}
    volumes:
      - /run/user/1000/pulse:/run/user/1000/pulse
      - whisper-cache:/root/.cache/huggingface
    stdin_open: true
    tty: true

volumes:
  whisper-cache:
