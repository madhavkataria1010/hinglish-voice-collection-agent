# docker compose -f docker/docker-compose.yml up
#
# Default service ("agent") runs the web entry point on http://localhost:7860/.
# This is the most reliable cross-platform path — the browser handles audio
# I/O so there's no Docker-mic-passthrough hassle on macOS.
#
# For the LocalAudioTransport path on Linux desktops with PulseAudio, run
# the alternate "agent-mic" service:
#     docker compose -f docker/docker-compose.yml --profile mic up agent-mic
# (Skip on macOS — Docker Desktop can't pass the host mic into the container.)

services:
  agent:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: hinglish-collection-agent:latest
    container_name: hinglish-agent
    env_file: ../.env
    ports:
      - "7860:7860"
    environment:
      - WEB_HOST=0.0.0.0
      - WEB_PORT=7860
      - WHISPER_MODEL=${WHISPER_MODEL:-large-v3}
      - WHISPER_COMPUTE_TYPE=${WHISPER_COMPUTE_TYPE:-int8}
      - WHISPER_BACKEND=${WHISPER_BACKEND:-local}
      - VAD_SILENCE_MS=${VAD_SILENCE_MS:-250}
    volumes:
      # Cache Whisper weights between runs so first-launch is the only
      # ~3GB download.
      - whisper-cache:/root/.cache/huggingface
    stdin_open: true
    tty: true

  # Linux-only mic passthrough. macOS Docker Desktop cannot pass /dev/snd.
  agent-mic:
    profiles: ["mic"]
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: hinglish-collection-agent:latest
    container_name: hinglish-agent-mic
    env_file: ../.env
    command: ["uv", "run", "python", "agent.py"]
    devices:
      - "/dev/snd:/dev/snd"
    group_add:
      - audio
    environment:
      - PULSE_SERVER=unix:/run/user/1000/pulse/native
      - WHISPER_MODEL=${WHISPER_MODEL:-large-v3}
      - WHISPER_COMPUTE_TYPE=${WHISPER_COMPUTE_TYPE:-int8}
      - WHISPER_BACKEND=${WHISPER_BACKEND:-local}
    volumes:
      - /run/user/1000/pulse:/run/user/1000/pulse
      - whisper-cache:/root/.cache/huggingface
    stdin_open: true
    tty: true

volumes:
  whisper-cache:
